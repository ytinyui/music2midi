project: pop2piano
dataset:
  sample_rate: 22050
  sync_feature_rate: 50
  segment_duration: 3
spectrogram:
  n_fft: 4096
  hop_length: 1024
  f_min: 10.0
t5:
  num_layers: 6
  d_ff: 1024
  feed_forward_proj: gated-gelu
  tie_word_embeddings: false
  tie_encoder_decoder: false
  vocab_size: 500
  n_positions: 1024
  relative_attention_num_buckets: 32
tokenizer:
  midi_quantize_ms: 100
  vocab_size:
    special: 2
    reserved: 8
    pitch: 128
    velocity: 128
    time: 200
  no_velocity: True
  default_velocity: 77
trainer:
  max_epochs: 500
  accumulate_grad_batches: 1
dataloader:
  batch_size: 16
  num_workers: 4
inference:
  batch_size: 64
genre_id:
  electronic: 0
  pop: 1
  rock: 2
  soundtrack: 3
  world_music: 4
  classical: 5
difficulty_id:
  beginner: 0
  intermediate: 1
  advanced: 2
